<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width , user-scalable=no" />
    <title>Bus Pass</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        background: #000;
        display: flex;
        justify-content: center;
      }

      .app {
        width: 400px;
        height: 850px;
        padding: 18px 14px 90px;
        position: relative;
        color: #fff;
      }

      /* HEADER */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
        margin-top: 20px;
      }
      .header h2 {
        font-size: 24px;
        font-weight: 600;
      }
      .header-right {
        display: flex;
        gap: 10px;
        opacity: 0.9;
      }
      .header-right button {
        color: #fff;
        background-color: #1a1a1a;
        padding-inline: 15px;
        padding-block: 7px;
        font-size: 16px;
        border: none;
        border-radius: 15px;
      }
      .header-right button i {
        padding-right: 10px;
      }

      /* BUS CHIP */
      .bus-chip {
        display: inline-block;
        background: #fff;
        color: #000;
        padding: 8px 16px;
        border-radius: 22px;
        font-size: 14px;
        margin-top: 20px;
        margin-bottom: 15px;
        font-weight: 700;
      }
      .bus-chip i {
        padding-right: 5px;
      }

      /* GOLD CARD */
      .pass-card {
        height: 540px;
        background-image: url(gp.png);
        background-size: cover;
        background-repeat: no-repeat;
        border-radius: 28px;
        padding: 22px 18px 20px;
        position: relative;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 0 40px rgba(255, 255, 255, 0.15);
      }

      /* subtle gold shine */
      .pass-card:before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 28px;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(255, 255, 255, 0.25),
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(255, 255, 255, 0.2),
            transparent 40%
          );
        pointer-events: none;
      }

      /* PASS TOP TEXT */
      .pass-top {
        position: relative;
        z-index: 2;
        color: #6e4f18;
        text-align: center;
      }
      .pass-top h3 {
        font-size: 17px;
        font-weight: 900;
        margin-bottom: 6px;
        position: relative;
        bottom: 14px;
        font-family: "Doto", sans-serif;
      }
      .pass-top p {
        font-size: 13px;
        font-weight: 600;
        /* line-height: 1.4; */
        position: relative;
        bottom: 20px;
      }

      /* INNER WHITE CARD */
      .inner-card {
        width: 160px;
        margin-top: 18px;
        margin-inline: auto;
        background: #fff;

        border: #af8c3c solid 3px;
        border-radius: 24px;
        padding: 22px 16px;

        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        align-content: center;
        text-align: center;
      }

      .inner-card img {
        width: 100px;
        height: 110px;
        border-radius: 18px;
        object-fit: cover;
        margin-bottom: 5px;
      }

      /* amount */
      .amount {
        color: #000;
        font-size: 25px;
        font-weight: 700;
        margin-bottom: 8px;
        text-align: center;
        margin-bottom: 15px;
      }

      .valid {
        color: grey;
        font-weight: bold;
        font-size: 12px;
        letter-spacing: 2px;
        color: #999;
        text-align: center;
      }

      .date {
        margin-top: 6px;
        font-size: 20px;
        font-weight: 700;
        color: #000;
        text-align: center;
      }
      #date {
        word-spacing: 4px;
      }

      /* bottom row */
      .bottom-row {
        margin-top: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
      }

      /* time box */
      .time-box {
        background: #fff;
        border-radius: 10px;
        padding-block: 3px;
        padding-inline: 10px;
        font-size: 13px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        position: relative;
        top: 25px;
      }
      .time-box strong {
        display: block;
        font-size: 15px;
      }
      .tt {
        color: #000;
      }
      #time {
        letter-spacing: 2px;
        font-weight: 400;
        font-size: 14px;;
      }

      /* activated sticker */
      .activated {
        width: 130px;
        height: 70px;
        margin-inline: 10px;
        position: absolute;
        left: 100px;
        top: 30px;
        color: #fff;
        border-radius: 16px;
        font-weight: 600;
        transform: rotate(-10deg);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        background-image: url(pass-act.png);
        background-origin: border-box;
        background-size: cover;
        background-repeat: no-repeat;
        display: block;
        border: #fff solid 4px;
      }

      /* logo */
      .logo {
        background-image: url(logo.png);
        background-size: contain;
        background-repeat: no-repeat;
        background-origin: border-box;
        width: 70px;
        height: 70px;
        position: relative;
        top: 10px;
        border-radius: 50px;
      }

      /* QR */
      .qr {
        color: #fff;
        background-color: #dcbc6a;
        padding: 5px;
        border-radius: 10px;
        position: relative;
        top: 25px;
        left: 5px;
      }
      .qr img {
        width: 60px;
        border-radius: 10px;
        /* background: #fff; */
      }

      /* terms */
      .terms {
        text-align: center;
        margin-top: 33px;
        font-size: 13px;
        color: #1a1a1a;
        text-decoration: underline;
        font-weight: 700;
        text-align: center;
      }

      /* renew button */
      .renew {
        margin-top: 20px;
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 18px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        background: #1a1a1a;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      }
      /* disclaimer */
      .disclaimer {
        font-size: 13px;
        font-weight: 600;
        text-align: center;
        margin-block: 18px;
      }
      /* bottom nav */
      .bottom-nav {
        width: 373px;
        height: 53px;
        background-image: url(footer.png);
        background-size: cover;
        background-repeat: no-repeat;
        position: fixed;
        bottom: 0;
      }
      /* help section */

      /* Overlay (dark background) */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        visibility: hidden;

        transition: 0.3s;
      }

      .overlay.active {
        opacity: 1;
        visibility: visible;
      }

      /* Bottom mini screen */
      .bottom-screen {
        width: 80%;
        position: fixed;
        bottom: 0;
        width: inherit;
        color: #000;
        height: 27vh;
        background: #ffffff;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.2);
        padding: 20px;
        box-sizing: border-box;
        transform: translateY(100%);
        transition: transform 0.3s ease-in;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        gap: 13px;
      }
      .bottom-screen h3 {
        margin-bottom: 4px;
        font-size: 20px;
      }
      .bottom-screen p {
        font-size: 16px;
        margin-bottom: 10px;
      }
      .bottom-screen .mini-btn {
        width: 100%;
        display: block;
        background: white;
        color: black;
        width: 100%;
        padding-inline: auto;
        padding-block: 8px;
        font-size: 15px;
        border-radius: 10px;
        border: 2px solid grey;
      }
      .bottom-screen #call {
        background-color: black;
        color: white;
      }
      .bottom-screen.active {
        transform: translateY(0);
      }

      /* Close button */
      .close-btn {
        float: right;
        background: red;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="header">
        <h2>Passes</h2>
        <div class="header-right">
          <button class="open-btn" id="help" onclick="openScreen()">
            <i class="fa fa-phone" aria-hidden="true"></i>Help
          </button>
          <button id="history" onclick="goToTranscation()">
            <i class="fa fa-history" aria-hidden="true"></i>History
          </button>
        </div>
      </div>

      <div class="bus-chip">
        <i class="fa fa-bus" aria-hidden="true"></i>Bus (1/1)
      </div>

      <div class="pass-card">
        <div class="pass-top">
          <h3>PASS NO: 00067722</h3>
          <p>விருப்பம் போல் பயணம்<br />செய்ய மாதச்சலுகை சீட்டு</p>
        </div>

        <div class="inner-card">
          <img src="profile.jpeg" alt="profile" />
          <div class="amount">&#8377;1000</div>
          <div class="valid">VALID TILL</div>
          <div class="date">02/05/2026</div>
        </div>

        <div class="bottom-row">
          <div class="time-box">
            <div class="tt" id="date"></div>
            <div class="tt" id="time"></div>
          </div>
          <div class="logo"></div>
          <div class="activated"></div>

          <div class="qr">
            <img src="qr.png" alt="qr" />
          </div>
        </div>

        <div class="terms">Terms & Conditions</div>
      </div>

      <button class="renew">Renew</button>
      <p class="disclaimer">
        *MTC no longer requires pass activation. Your pass is ready to use
        immediately after purchase
      </p>
      <!-- footer -->
      <div class="bottom-nav"></div>

      <!-- help section -->

      <!-- Overlay -->
      <div id="overlay" class="overlay" onclick="closeScreen()"></div>

      <!-- Bottom Mini Screen -->
      <div id="bottomScreen" class="bottom-screen">
        <h3>Get Support</h3>
        <p>if you face any difficulties,please contact MTC support</p>
        <button id="h&s" class="mini-btn">Help and Support</button>
        <button id="call" class="mini-btn">Call</button>
      </div>
    </div>
    <script>
      //help button click
      function goToTranscation() {
        window.location.href = "transaction.html";
      }
      // time and date section
      function updateClock() {
        document.getElementById("date").innerHTML = moment().format("MMM D");

        document.getElementById("time").innerHTML = moment().format("HH:mm:ss");
      }

      updateClock();
      setInterval(updateClock, 1000);

      // ===== POPUP FUNCTION =====
      function showPopup(imageUrl, isQR = false) {
        // create overlay
        const overlay = document.createElement("div");
        overlay.style.position = "fixed";
        overlay.style.top = "0";
        overlay.style.left = "0";
        overlay.style.width = "100%";
        overlay.style.height = "100%";
        overlay.style.background = "rgba(0,0,0,0.8)";
        overlay.style.display = "flex";
        overlay.style.alignItems = "center";
        overlay.style.justifyContent = "center";
        overlay.style.zIndex = "9999";

        // popup container
        const popup = document.createElement("div");
        popup.style.padding = "20px";
        popup.style.borderRadius = "20px";
        popup.style.background = isQR ? "#b9bc62" : "transparent";
        // popup.style.border = "white solid 1px";

        // image
        const img = document.createElement("img");
        img.src = imageUrl;
        img.style.maxWidth = "300px";
        img.style.borderRadius = "20px";

        popup.appendChild(img);
        overlay.appendChild(popup);
        document.body.appendChild(overlay);

        // close on click
        overlay.addEventListener("click", () => {
          overlay.remove();
        });
      }

      // ===== CLICK EVENTS =====
      document.addEventListener("DOMContentLoaded", () => {
        // Activated popup
        const activated = document.querySelector(".activated");
        activated.addEventListener("click", () => {
          showPopup("pass-act.png");
        });

        // QR popup
        const qr = document.querySelector(".qr img");
        qr.addEventListener("click", () => {
          showPopup("qr.png", true);
        });

        const profile = document.querySelector(".inner-card img");
        profile.addEventListener("click", () => {
          showPopup("profile.jpeg");
        });

        // time and date popup
        const tt = document.querySelector(".time-box tt");
        tt.addEventListener("click", () => {
          showPopup("");
        });
      });

      // time and date popup
      // ===== TIME POPUP =====
      // ===== TIME POPUP (EXACT CLONE) =====
      // ===== TIME POPUP (LIVE WORKING CLONE) =====
      function showTimePopup() {
        // create overlay
        const overlay = document.createElement("div");
        overlay.style.position = "fixed";
        overlay.style.top = "0";
        overlay.style.left = "0";
        overlay.style.width = "100%";
        overlay.style.height = "100%";
        overlay.style.background = "rgba(0,0,0,0.8)";
        overlay.style.display = "flex";
        overlay.style.alignItems = "center";
        overlay.style.justifyContent = "center";
        overlay.style.zIndex = "9999";

        // clone your existing time-box
        const original = document.querySelector(".time-box");
        const popup = original.cloneNode(true);

        popup.style.transform = "scale(2)";
        popup.style.top = "0";
        popup.style.position = "static";

        // get cloned elements (IMPORTANT)
        const popupDate = popup.querySelector("#date");
        const popupTime = popup.querySelector("#time");

        // update time inside popup
        function updatePopupClock() {
          popupDate.innerHTML = moment().format("MMM D");
          popupTime.innerHTML = moment().format("HH:mm:ss");
        }

        updatePopupClock();
        const interval = setInterval(updatePopupClock, 1000);

        // stop double click issue
        popup.addEventListener("click", (e) => {
          e.stopPropagation();
        });

        overlay.appendChild(popup);
        document.body.appendChild(overlay);

        // close on click + stop interval
        overlay.addEventListener("click", () => {
          clearInterval(interval); // IMPORTANT 🔥
          overlay.remove();
        });
      }
      // Time box popup (clone exact UI)
      const timeBox = document.querySelector(".time-box");

      timeBox.addEventListener("click", () => {
        showTimePopup();
      });
      // help button toggle
      function openScreen() {
        document.getElementById("bottomScreen").classList.add("active");
        document.getElementById("overlay").classList.add("active");
      }

      function closeScreen() {
        document.getElementById("bottomScreen").classList.remove("active");
        document.getElementById("overlay").classList.remove("active");
      }
    </script>
  </body>
</html>
