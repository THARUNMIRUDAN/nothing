<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width , user-scalable=no" />
    <title>Bus Pass</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        background: #000;
        display: flex;
        justify-content: center;
      }

      .app {
        width: 360px;
        min-height: 800px;
        padding: 18px 14px 90px;
        position: relative;
        color: #fff;
      }

      /* HEADER */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
      }
      .header h2 {
        font-size: 22px;
        font-weight: 600;
      }
      .header-right {
        display: flex;
        gap: 10px;
        font-size: 10px;
        opacity: 0.9;
      }
      .header-right button{
        color: #fff;
        background-color: #1a1a1a;
        padding-inline:15px;
        padding-block: 5px;
        border: none;
        border-radius: 15px;

      }
      .header-right button i{
        padding-right: 10px;
      }

      /* BUS CHIP */
      .bus-chip {
        display: inline-block;
        background: #fff;
        color: #000;
        padding: 8px 16px;
        border-radius: 22px;
        font-size: 14px;
        margin-bottom: 18px;
        font-weight: 700;
      }
      .bus-chip i{
        padding-right: 5px;
      }

      /* GOLD CARD */
      .pass-card {
        background-image: url(/gp.png);
        background-size: cover;
        background-repeat: no-repeat;
        border-radius: 28px;
        padding: 22px 18px 20px;
        position: relative;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 0 40px rgba(255, 255, 255, 0.15);
      }

      /* subtle gold shine */
      .pass-card:before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 28px;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(255, 255, 255, 0.25),
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(255, 255, 255, 0.2),
            transparent 40%
          );
        pointer-events: none;
      }

      /* PASS TOP TEXT */
      .pass-top {
        position: relative;
        z-index: 2;
        color: #6e4f18;
        text-align: center;
      }
      .pass-top h3 {
        font-size: 15px;
        font-weight: 900;
        margin-bottom: 6px;
        position: relative;
        bottom: 14px;
        font-family: "Doto", sans-serif;
      }
      .pass-top p {
        font-size: 11px;
        font-weight: 600;
        /* line-height: 1.4; */
        position: relative;
        bottom: 20px;
      }

      /* INNER WHITE CARD */
      .inner-card {
        width: 150px;
        margin-top: 18px;
        margin: auto;
        background: #fff;
        border: #af8c3c solid 3px;
        border-radius: 24px;
        padding: 22px 16px;

        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        align-content: center;
        text-align: center;
      }

      .inner-card img {
        width: 100px;
        height: 110px;
        border-radius: 18px;
        object-fit: cover;
        margin-bottom: 5px;
      }

      /* amount */
      .amount {
        color: #000;
        font-size: 25px;
        font-weight: 700;
        margin-bottom: 8px;
        text-align: center;
      }

      .valid {
        color: grey;
        font-weight: bold;
        font-size: 12px;
        letter-spacing: 2px;
        color: #999;
        text-align: center;
      }

      .date {
        margin-top: 6px;
        font-size: 20px;
        font-weight: 700;
        color: #000;
        text-align: center;
      }
      #date{
        word-spacing: 4px;
      }

      /* bottom row */
      .bottom-row {
        margin-top: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
      }

      /* time box */
      .time-box {
        background: #fff;
        border-radius: 10px;
        padding-block: 3px;
        padding-inline: 7px;
        font-size: 13px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        position: relative;
        top: 25px;
      }
      .time-box strong {
        display: block;
        font-size: 15px;
      }
      .tt {
        color: #000;
      }
      #time {
        letter-spacing: 2px;
        font-weight: 400;
      }

      /* activated sticker */
      .activated {
        width: 120px;
        height:65px;
        margin-inline: 10px;
        position: absolute;
        left: 90px;
        top: 15px;
        color: #fff;
        border-radius: 16px;
        font-weight: 600;
        transform: rotate(-10deg);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        background-image: url(pass-act.png);
        background-origin: border-box;
        background-size: contain;
        background-repeat: no-repeat;
        display: block;
        border: #fff solid 4px;
        
      }

      /* logo */
      .logo{
        background-image: url(logo.png);
        background-size: contain;
        background-repeat: no-repeat;
        background-origin: border-box;
        width: 70px;
        height: 70px;
        position: relative;
        top: 0px;
        border-radius: 50px;
       
      }

      /* QR */
      .qr{
        color: #fff;
        background-color: #fff;
        padding: 5px;
        border-radius: 10px;
        position: relative;
        top: 20px;
        left: 5px;
      }
      .qr img {
        width: 50px;
        border-radius: 10px;
        background: #fff;
      }

      /* terms */
      .terms {
        text-align: center;
        margin-top: 18px;
        font-size: 13px;
        color: #1a1a1a;
        text-decoration: underline;
        font-weight: 700;
        text-align: center;
      }

      /* renew button */
      .renew {
        margin-top: 10px;
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 18px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        background: #1a1a1a;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      }
      /* disclaimer */
      .disclaimer{
        font-size: 13px;
        font-weight: 600;
        text-align: center;
      }
      /* bottom nav */
      .bottom-nav {
        position: fixed;
        width: inherit;
        height: 0px;
        background: #fff;
        display: flex;
        align-items: center;
        font-size: 15px;

      }
      .bottom-nav div {
        background-color: #000;
        padding-inline: 16px;

      }
      .bottom-nav div:nth-child(2){
        color: red;
      }
      .bottom-nav div i{
        font-size: 20px;
        padding-inline: 5px;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="header">
        <h2>Passes</h2>
        <div class="header-right">
          <button><i class="fa fa-phone" aria-hidden="true"></i>Help</button>
          <button><i class="fa fa-history" aria-hidden="true"></i>History</button>
        </div>
      </div>

      <div class="bus-chip"><i class="fa fa-bus" aria-hidden="true"></i>Bus (1/1)</div>

      <div class="pass-card">
        <div class="pass-top">
          <h3>PASS NO: 00067722</h3>
          <p>விருப்பம் போல் பயணம்<br />செய்ய மாதச்சலுகை சீட்டு</p>
        </div>

        <div class="inner-card">
          <img
            src="profile.jpeg"
            alt="profile"
          />
          <div class="amount">₹1000</div>
          <div class="valid">VALID TILL</div>
          <div class="date">02/05/2026</div>
        </div>

        <div class="bottom-row">
          <div class="time-box">
            <div class="tt" id="date"></div>
            <div class="tt" id="time"></div>
          </div>
          <div class="logo"></div>
          <div class="activated">
            
          </div>

          <div class="qr">
            <img
              src="qr.png"
              alt="qr"
            />
          </div>
        </div>

        <div class="terms">Terms & Conditions</div>
      </div>

      <button class="renew">Renew</button>
      <p class="disclaimer">*MTC no longer requires pass activation. Your pass is ready to use immediately after purchase</p>

      <div class="bottom-nav">
          <div><i class="fa fa-home" aria-hidden="true"></i><br>Home</div>
          <div><i class="fa fa-address-card" aria-hidden="true"></i><br>Passes</div>
          <div><i class="fa fa-dot-circle-o" aria-hidden="true"></i><br>Live</div>
          <div><i class="fa fa-ticket" aria-hidden="true"></i><br>Ticket</div>
          <div><i class="fa fa-user" aria-hidden="true"></i><br>Profile</div>
      </div>
    </div>

    <script>
      function updateClock() {
        document.getElementById("date").innerHTML = moment().format("MMM D");

        document.getElementById("time").innerHTML = moment().format("HH:mm:ss");
      }

      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
