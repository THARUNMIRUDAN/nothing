<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transaction History</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
      }

      .mobile-container {
        width: 390px;
        min-height: 100vh;
        background: #f4f4f4;
        padding: 20px 16px;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 25px;
      }

      .back-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #eaeaea;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        border: none;
      }

      .title {
        font-size: 20px;
        font-weight: 600;
        color: #222;
      }

      .buy-btn {
        background: #1f7ae0;
        color: #fff;
        border: none;
        padding: 10px 18px;
        border-radius: 22px;
        font-weight: 600;
        font-size: 14px;
      }

      /* Card */
      .card {
        background: #fff;
        border-radius: 20px;
        padding: 18px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }

      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .left-section {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .pass-img {
        width: 55px;
        height: 55px;
        border-radius: 12px;
        object-fit: cover;
      }

      .pass-title {
        font-size: 18px;
        font-weight: 600;
        color: #222;
      }

      .pass-date {
        font-size: 14px;
        color: #8a8a8a;
        margin-top: 3px;
      }

      .price {
        font-size: 22px;
        font-weight: 700;
        color: #222;
      }

      .divider {
        margin: 16px 0;
        border-top: 1px dashed #e0e0e0;
      }

      .card-bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .status {
        font-size: 15px;
        font-weight: 600;
      }

      .status.active {
        color: #1c8c3a;
      }

      .status.expired {
        color: #9c9c9c;
      }

      .status.pending {
        color: #9c9c9c;
      }

      .time {
        font-size: 14px;
        color: #9c9c9c;
      }
    </style>
  </head>
  <body>
    <div class="mobile-container">
      <div class="header">
        <button class="back-btn" onclick="window.location.href = 'index.html'">
          &#8592;
        </button>
        <div class="title">Transaction History</div>
        <button class="buy-btn">Buy New</button>
      </div>

      <!-- Card 1 top need any change change here -->
      <div class="card">
        <div class="card-top">
          <div class="left-section">
            <img src="trans-logo.png" class="pass-img" />
            <div>
              <div class="pass-title">1000 Pass</div>
              <div class="pass-date">9' Apr - 8' May 26</div>
            </div>
          </div>
          <div class="price">₹1000</div>
        </div>

        <div class="divider"></div>

        <div class="card-bottom">
          <div class="status active">Active</div>
          <div class="time">9' Mar • 09:06pm</div>
        </div>
      </div>
      <!-- card 2 -->
      <div class="card">
        <div class="card-top">
          <div class="left-section">
            <img src="trans-logo.png" class="pass-img" />
            <div>
              <div class="pass-title">1000 Pass</div>
              <div class="pass-date">9' Mar - 8' Apr 26</div>
            </div>
          </div>
          <div class="price">₹1000</div>
        </div>

        <div class="divider"></div>

        <div class="card-bottom">
          <div class="status pending">Expired</div>
          <div class="time">9' Feb • 08:34am</div>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="card">
        <div class="card-top">
          <div class="left-section">
            <img src="trans-logo.png" class="pass-img" />
            <div>
              <div class="pass-title">1000 Pass</div>
              <div class="pass-date">9' Feb - 8' Mar 26</div>
            </div>
          </div>
          <div class="price">₹1000</div>
        </div>

        <div class="divider"></div>

        <div class="card-bottom">
          <div class="status expired">Expired</div>
          <div class="time">9' Feb • 01:19pm</div>
        </div>
      </div>

      <!-- Card 4 -->
      <div class="card">
        <div class="card-top">
          <div class="left-section">
            <img src="trans-logo.png" class="pass-img" />
            <div>
              <div class="pass-title">1000 Pass</div>
              <div class="pass-date">9' Jan - 8' Feb 26</div>
            </div>
          </div>
          <div class="price">₹1000</div>
        </div>

        <div class="divider"></div>

        <div class="card-bottom">
          <div class="status pending">Expired</div>
          <div class="time">9' Feb • 10:46am</div>
        </div>
      </div>
    </div>
  </body>
</html>
